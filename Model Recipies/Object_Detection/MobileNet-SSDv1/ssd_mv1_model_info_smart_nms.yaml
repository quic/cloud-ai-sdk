# Official Model Location: wget https://github.com/onnx/models/raw/main/vision/object_detection_segmentation/ssd-mobilenetv1/model/ssd_mobilenet_v1_10.onnx
# Onnx Vision Model Zoo Location: https://github.com/onnx/models/tree/main/vision/object_detection_segmentation/ssd-mobilenetv1
MODEL:
    INFO:
        DESCRIPTION: "SSD MobileNet V1 Opset 10 Object Detection Model"
        MODEL_TYPE: SSDMOBILENET
        MODEL_PATH: 'ssd_mobilenet_v1_10.onnx'
        INPUT_INFO: [["image_tensor:0", [1, 300, 300, 3]]]
        EXPORT_TYPE: ONNX
        DYNAMIC_INFO: [["image_tensor:0", ["batch_size", 300, 300, 3]]]
        VALIDATE: False
        WORKSPACE: WORKSPACE
        VERBOSE: INFO #INFO, DEBUG, WARNING. TRACE
        #INPUT_LIST_FILE: ""
        #CUSTOM_OP_INFO_FILEPATH: ""
    PRE_POST_HANDLE:
        ANCHOR_BIN_FILE: None
        POST_PLUGIN: SMARTNMS
        PRE_PLUGIN: True
        NMS_PARAMS:
            MAX_OUTPUT_SIZE_PER_CLASS: None
            MAX_TOTAL_SIZE: None
            IOU_THRESHOLD: None
            SCORE_THRESHOLD: None
            CLIP_BOXES: None
            PAD_PER_CLASS: None
