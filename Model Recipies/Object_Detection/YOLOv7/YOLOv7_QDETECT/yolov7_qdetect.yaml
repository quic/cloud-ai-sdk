# Onnx Vision Model Zoo Location: https://github.com/onnx/models/tree/main/vision/object_detection_segmentation/yolov4

MODEL:
    INFO:
        DESCRIPTION: "YoloV4 Opset 11 Object Detection Model"   
        MODEL_TYPE: YOLOV5
        MODEL_PATH: 'ONNX/yolov7_640_640_smartNMS.onnx'
        INPUT_INFO: [["images", [1, 3, 640, 640]]]
        EXPORT_TYPE: ONNX
        DYNAMIC_INFO: [["images", ["batch_size", 3, 640, 640]]]
        VALIDATE: False
        WORKSPACE: WORKSPACE
        VERBOSE: DEBUG #, WARNING. TRACE

    PRE_POST_HANDLE:
        ANCHOR_BIN_FILE: 'QDetect/prior_files/prior_yolov7.bin'
        POST_PLUGIN: QDETECT
        PRE_PLUGIN: True
        NMS_PARAMS:
            MAX_OUTPUT_SIZE_PER_CLASS: 100
            MAX_TOTAL_SIZE: 100
            IOU_THRESHOLD: 0.45
            SCORE_THRESHOLD: 0.25
            CLIP_BOXES: False
            PAD_PER_CLASS: False

