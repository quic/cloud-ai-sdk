# Onnx Vision Model Zoo Location: https://github.com/onnx/models/tree/main/vision/classification/resnet

MODEL:
    INFO:
        DESCRIPTION: "ResNet50 V1 Classification Model"
        MODEL_TYPE: CLASSIFICATION
        MODEL_PATH: 'resnet50_v1.pb'
        INPUT_INFO: [["input_tensor", [1, 224, 224, 3]]]
        EXPORT_TYPE: ONNX
        DYNAMIC_INFO: [["input_tensor", [1, 224, 224, 3]]]
        VALIDATE: False
        WORKSPACE: WORKSPACE_RESNET50
        VERBOSE: INFO #INFO, DEBUG, WARNING. TRACE

    PRE_POST_HANDLE:
        ANCHOR_BIN_FILE: None
        POST_PLUGIN: NONE
        PRE_PLUGIN: True
        NMS_PARAMS:
            MAX_OUTPUT_SIZE_PER_CLASS: None
            MAX_TOTAL_SIZE: None
            IOU_THRESHOLD: None
            SCORE_THRESHOLD: None
            CLIP_BOXES: None
            PAD_PER_CLASS: None
