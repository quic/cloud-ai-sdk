MODEL:
    INFO:
        DESCRIPTION: "HuggingFace Transformers DistilRoBerta Model"
        MODEL_TYPE: TRANSFORMERS
        MODEL_PATH: 'distillrobertaqa/model.onnx'
        INPUT_INFO: [["input_ids", [1, 128]], 
                     ["attention_mask", [1, 128]]]
        EXPORT_TYPE: ONNX
        DYNAMIC_INFO: [["input_ids", ["batch_size", 128]], 
                     ["attention_mask", ["batch_size", 128]]]
        VALIDATE: False
        WORKSPACE: WORKSPACE
        VERBOSE: DEBUG #INFO, DEBUG, WARNING. TRACE

    PRE_POST_HANDLE:
        ANCHOR_BIN_FILE: None
        POST_PLUGIN: NONE
        PRE_PLUGIN: False
        NMS_PARAMS:
            MAX_OUTPUT_SIZE_PER_CLASS: None
            MAX_TOTAL_SIZE: None
            IOU_THRESHOLD: None
            SCORE_THRESHOLD: None
            CLIP_BOXES: None
            PAD_PER_CLASS: None
