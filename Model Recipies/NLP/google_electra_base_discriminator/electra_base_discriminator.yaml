# Official Model Location: https://huggingface.co/models
# Model Generation steps from HF:
  # git clone https://github.com/huggingface/transformers.git
  # pip install -e transformers
  # python -m transformers.convert_graph_to_onnx --model bert-base-uncased --pipeline question-answering --framework pt bert_base.onnx --opset 12


MODEL:
    INFO:
        DESCRIPTION: "HuggingFace Transformers Bert-Large Model"
        MODEL_TYPE: TRANSFORMERS
        MODEL_PATH: 'electra-base-discriminator/generatedModels/electra-base-discriminator_simplified.onnx'
        INPUT_INFO: [["input_ids", [1, 128]],
                     ["input_mask", [1, 128]],
                     ["segment_ids", [1, 128]]]
        EXPORT_TYPE: ONNX
        DYNAMIC_INFO: []
        VALIDATE: False
        WORKSPACE: WORKSPACE
        VERBOSE: DEBUG #INFO, DEBUG, WARNING. TRACE

    PRE_POST_HANDLE:
        ANCHOR_BIN_FILE: None
        POST_PLUGIN: NONE
        PRE_PLUGIN: False
        NMS_PARAMS:
            MAX_OUTPUT_SIZE_PER_CLASS: None
            MAX_TOTAL_SIZE: None
            IOU_THRESHOLD: None
            SCORE_THRESHOLD: None
            CLIP_BOXES: None
            PAD_PER_CLASS: None

