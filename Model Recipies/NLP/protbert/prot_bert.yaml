# Official Model Location: https://huggingface.co/models

MODEL:
    INFO:
        DESCRIPTION: "HuggingFace Transformers Biomed Roberta Model"
        MODEL_TYPE: TRANSFORMERS
        MODEL_PATH: 'generatedModels/ProtBert.onnx/model_modified.onnx'
        INPUT_INFO: [["input_ids", [1, 128]],
                     ["attention_mask", [1, 128]],
                     ["token_type_ids", [1, 128]]]
        EXPORT_TYPE: ONNX
        DYNAMIC_INFO: []
        VALIDATE: True
        WORKSPACE: ProtBert
        VERBOSE: INFO #INFO, DEBUG, WARNING. TRACE
        INPUT_LIST_FILE: ""

    PRE_POST_HANDLE:
        ANCHOR_BIN_FILE: None
        POST_PLUGIN: NONE
        PRE_PLUGIN: False
        NMS_PARAMS:
            MAX_OUTPUT_SIZE_PER_CLASS: None
            MAX_TOTAL_SIZE: None
            IOU_THRESHOLD: None
            SCORE_THRESHOLD: None
            CLIP_BOXES: None
            PAD_PER_CLASS: None
