model:
    info:
        desc: "BERT-base model"
        batchsize: 1
    globals:
        sl: 128
        count: -1
        calib: -1
        squad_ver: 1
        npi_file: ./bert_base_npi.yaml
        model_name: madlag/bert-base-uncased-squadv1-x2.01-f89.2-d30-hybrid-rewind-opt-v1
        cached_path: ./bert-base-uncased-squadv1

    dataset:
        name: SQUAD
        path: './squad_v1.1/'
        inputlist_file: datafile.txt
        annotation_file: dev-v1.1.json
        calibration:
            type: dataset
            file: calib_datafile.txt

        transformations:
            - plugin:
                  name: create_squad_examples
                  params:
                      squad_version: $squad_ver
                      max_inputs: $count
                      max_calib: $calib
                      vocabulary: $cached_path
                      max_seq_length: $sl
                      doc_stride: 128
                      max_query_length: 64
                      model_inputs_count: 3
                      cached_vocab_path: $cached_path
            - plugin:
                  name: filter_dataset
                  params:
                      random: False
                      max_inputs: $count
                      max_calib: $calib

    processing:
        preprocessing:
            transformations:
                - plugin:
                      name: squad_preprocess

        postprocessing:
            transformations:
                - plugin:
                      name: squad_postprocess

    inference-engine:
        model_path: ./generatedModels/BERT-Base-Flexible-BS-SL.onnx
        onnx_define_symbol: "seq_len=$sl batch_size=1"
        platforms:
            - platform:
                  name: onnxrt
                  tag: ci

            - platform:
                  tag: ci, aic_fp16
                  name: aic
                  precision: fp16
                  params:
                      aic-num-cores: 14

            - platform:
                  name: aic
                  tag: ci,aic_int8_mp
                  precision: int8
                  reuse_pgq: True #default
                  params:
                      # Best symmetric mixed precision configuration
                      aic-num-cores: 14
                      quantization-calibration: MSE
                      quantization-schema-activations: symmetric_with_uint8
                      quantization-schema-constants: symmetric_with_uint8
                      enable-rowwise: True
                      node-precision-info: $npi_file

            - platform:
                 name: aic
                 precision: int8
                 reuse_pgq: True # default
                 pgq_group: group1
                 tag: pgq_sweep
                 params:
                      aic-num-cores: 14
                      quantization-calibration: None | SQNR | MSE | KLMinimization | KLMinimizationV2 | Percentile
                      quantization-schema-activations: symmetric_with_uint8
                      quantization-schema-constants: symmetric_with_uint8
                      enable-rowwise: True | False
                      percentile-calibration-value: 99.9 | 99.99 | range=(99.999-99.9999-0.0001) | 99.9999
                      node-precision-info: $npi_file

            - platform:
                  name: aic
                  precision: int8
                  reuse_pgq: True # default
                  pgq_group: group1
                  tag: pgq_sweep
                  params:
                      aic-num-cores: 14
                      quantization-calibration: None | SQNR | MSE | KLMinimization | KLMinimizationV2 | Percentile
                      quantization-schema-activations: asymmetric
                      quantization-schema-constants: asymmetric | symmetric
                      enable-rowwise: True | False
                      percentile-calibration-value: 99.9 | 99.99 | range=(99.999-99.9999-0.0001) | 99.9999
                      node-precision-info: $npi_file


        inputs_info:
            - input_ids:
                  type: int64
                  shape: ["*", $sl]
            - input_mask:
                  type: int64
                  shape: ["*", $sl]
            - segment_ids:
                  type: int64
                  shape: ["*", $sl]

        outputs_info:
            - output_start_logits:
                  type: float32
                  shape: ["*", $sl]
            - output_end_logits:
                  type: float32
                  shape: ["*", $sl]

    evaluator:
        metrics:
            - plugin:
                  name: squad_eval
                  params:
                      n_best_size: 20
                      max_answer_length: 30
                      vocabulary: $model_name
                      cached_vocab_path: $cached_path
